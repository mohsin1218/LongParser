site_name: LongParser
site_description: Privacy-first document intelligence engine — parse PDFs, DOCX, PPTX, XLSX & CSV into AI-ready chunks for RAG pipelines.
site_url: https://endevsols.github.io/LongParser/
repo_url: https://github.com/ENDEVSOLS/LongParser
repo_name: ENDEVSOLS/LongParser
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - User Guide:
    - Document Parsing: guide/parsing.md
    - Hybrid Chunking: guide/chunking.md
    - Vector Indexing: guide/indexing.md
    - HITL Review: guide/hitl.md
    - Chat Engine: guide/chat.md
  - Integrations:
    - LangChain: integrations/langchain.md
    - LlamaIndex: integrations/llamaindex.md
    - Vector Stores: integrations/vector-stores.md
  - REST API:
    - Overview: api/overview.md
    - Endpoints: api/endpoints.md
  - Deployment:
    - Docker: deployment/docker.md
    - Environment Variables: deployment/environment.md
  - API Reference:
    - Pipeline: reference/pipeline.md
    - Schemas: reference/schemas.md
    - Chunkers: reference/chunkers.md
    - Extractors: reference/extractors.md
  - Contributing: contributing.md
  - Changelog: changelog.md
  - Security: security.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ENDEVSOLS/LongParser
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/longparser/
  version:
    provider: mike
